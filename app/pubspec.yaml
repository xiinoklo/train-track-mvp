name: app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.5
  youtube_player_flutter: ^9.1.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/body_recovery_map.svg
    - assets/images/traintrack_logo.png
    
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/traintrack_logo.png"
  adaptive_icon_background: "#1E3A8A"
  adaptive_icon_foreground: "assets/images/traintrack_logo.png"
  min_sdk_android: 21